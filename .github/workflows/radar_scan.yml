name: Turnaround Radar

on:
  schedule:
    # heavy scan: once after US close (20:15 UTC = 16:15 ET), Mon-Fri
    - cron: '15 20 * * 1-5'
    # US quotes — pre(04:00 ET)+regular+post(→20:00 ET). 08:00-23:59 UTC, every 15 min.
    #   (20:15 heavy-scan cron also refreshes quotes, so no gap at the close.)
    - cron: '*/15 8-23 * * 1-5'
    # HK quotes — 09:00-16:00 HKT = 01:00-08:00 UTC, every 15 min.
    - cron: '*/15 1-7 * * 1-5'
  workflow_dispatch:
    inputs:
      quotes_only:
        description: 'Quotes only (skip the heavy scan)'
        type: boolean
        default: false

jobs:
  radar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install yfinance pandas numpy jinja2

      # FULL SCAN unless: (a) it's one of the quote-only crons, or
      #                   (b) the user explicitly ticked quotes_only.
      # Manual runs therefore default to a FULL scan.
      - name: Determine mode
        id: mode
        run: |
          FULL=true
          if [ "${{ github.event_name }}" = "schedule" ] && \
             [ "${{ github.event.schedule }}" != "15 20 * * 1-5" ]; then
            FULL=false
          fi
          if [ "${{ github.event.inputs.quotes_only }}" = "true" ]; then
            FULL=false
          fi
          echo "full=$FULL" >> $GITHUB_OUTPUT
          echo "════════════════════════════════"
          echo "  event    : ${{ github.event_name }}"
          echo "  schedule : ${{ github.event.schedule }}"
          echo "  FULL SCAN: $FULL"
          echo "════════════════════════════════"

      - name: Pull existing radar.json from gh-pages (quote-only runs)
        if: steps.mode.outputs.full == 'false'
        run: |
          mkdir -p frontend/public
          git fetch origin gh-pages --depth=1
          if ! git show origin/gh-pages:radar.json > frontend/public/radar.json 2>/dev/null; then
            echo "::error::Could not read radar.json from gh-pages."
            echo "A quote-only run needs an existing radar.json. Run this workflow"
            echo "manually with 'quotes_only' UNTICKED to generate one first."
            exit 1
          fi
          # Guard: a previous broken run may have pushed an empty {} — refuse to build on it.
          if ! python -c "import json,sys; d=json.load(open('frontend/public/radar.json')); sys.exit(0 if d.get('cards') else 1)"; then
            echo "::error::radar.json on gh-pages has no cards (it is empty)."
            echo "Run this workflow manually with 'quotes_only' UNTICKED to rebuild it."
            exit 1
          fi
          echo "Pulled radar.json from gh-pages OK"

      - name: Full radar scan
        if: steps.mode.outputs.full == 'true'
        run: python scanner/radar_scan.py

      - name: Verify radar.json
        run: |
          python - <<'PY'
          import json, sys
          try:
              d = json.load(open('frontend/public/radar.json'))
          except Exception as e:
              print(f"::error::radar.json unreadable: {e}"); sys.exit(1)
          cards = d.get('cards')
          if cards is None:
              print("::error::radar.json has no 'cards' key — the full scan never ran.")
              print("Re-run this workflow manually (leave 'quotes_only' UNTICKED).")
              sys.exit(1)
          print(f"cards={len(cards)}  counts={d.get('scen_counts')}  scanned_at={d.get('scanned_at')}")
          PY

      - name: Refresh quotes
        env:
          # Restrict quote fetching to the market whose session is open, so we
          # don't fetch 130+ tickers when only one exchange is trading.
          #   HK cron (01-07 UTC) → HK only ; everything else → US only ;
          #   the 20:15 full-scan and manual runs → BOTH.
          QUOTE_MARKETS: >-
            ${{ (github.event_name == 'schedule' && startsWith(github.event.schedule, '*/15 1-7')) && 'HK'
             || (github.event_name == 'schedule' && github.event.schedule == '*/15 8-23 * * 1-5') && 'US'
             || 'US,HK' }}
        run: python scanner/radar_quotes.py

      - name: Push to gh-pages
        run: |
          ls -la frontend/public/radar.json frontend/public/radar_quotes.json
          cp frontend/public/radar.json        /tmp/radar_out.json
          cp frontend/public/radar_quotes.json /tmp/quotes_out.json

          git fetch origin gh-pages
          git checkout gh-pages
          cp /tmp/radar_out.json  ./radar.json
          cp /tmp/quotes_out.json ./radar_quotes.json

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add radar.json radar_quotes.json
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "radar: $(date -u '+%Y-%m-%d %H:%M UTC') full=${{ steps.mode.outputs.full }}"
          git push origin gh-pages
