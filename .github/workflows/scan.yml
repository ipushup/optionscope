name: OptionScope Scanner

on:
  schedule:
    # Every 30 mins during US market hours (9:30 AM - 4:00 PM ET = 13:30 - 20:00 UTC)
    # Monday to Friday only
    - cron: '30 13 * * 1-5'   # 9:30 AM ET  - market open
    - cron: '0  14 * * 1-5'   # 10:00 AM ET
    - cron: '30 14 * * 1-5'   # 10:30 AM ET
    - cron: '0  15 * * 1-5'   # 11:00 AM ET
    - cron: '30 15 * * 1-5'   # 11:30 AM ET
    - cron: '0  16 * * 1-5'   # 12:00 PM ET
    - cron: '30 16 * * 1-5'   # 12:30 PM ET
    - cron: '0  17 * * 1-5'   # 1:00 PM ET
    - cron: '30 17 * * 1-5'   # 1:30 PM ET
    - cron: '0  18 * * 1-5'   # 2:00 PM ET
    - cron: '30 18 * * 1-5'   # 2:30 PM ET
    - cron: '0  19 * * 1-5'   # 3:00 PM ET
    - cron: '30 19 * * 1-5'   # 3:30 PM ET
    - cron: '55 19 * * 1-5'   # 3:55 PM ET  - near close

  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy scipy

      - name: Run option scanner
        run: python scanner/run_scan.py

      - name: Show results.json preview
        run: |
          echo "=== File check ==="
          ls -la frontend/public/results.json
          echo "=== Preview ==="
          head -30 frontend/public/results.json

      - name: Push results.json to gh-pages
        run: |
          cp frontend/public/results.json /tmp/results.json

          git fetch origin gh-pages
          git checkout gh-pages

          cp /tmp/results.json ./results.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          git diff --staged --quiet && echo "No changes" || git commit -m "scan: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin gh-pages
          echo "=== Done. results.json pushed to gh-pages ==="
