name: OptionScope Scanner

on:
  schedule:
    - cron: '30 13 * * 1-5'
    - cron: '0  15 * * 1-5'
    - cron: '0  17 * * 1-5'
    - cron: '0  19 * * 1-5'
    - cron: '55 19 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy scipy

      - name: Run option scanner
        run: python scanner/run_scan.py

      - name: Show results.json preview
        run: |
          echo "=== File check ==="
          ls -la frontend/public/results.json
          echo "=== Preview ==="
          head -30 frontend/public/results.json

      - name: Push results.json to gh-pages
        run: |
          cp frontend/public/results.json /tmp/results.json

          git fetch origin gh-pages
          git checkout gh-pages

          cp /tmp/results.json ./results.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          git diff --staged --quiet && echo "No changes" || git commit -m "scan: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin gh-pages
          echo "=== Done. results.json pushed to gh-pages ==="
