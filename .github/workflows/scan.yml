name: OptionScope Scanner

on:
  schedule:
    - cron: '30 13 * * 1-5'
    - cron: '0  15 * * 1-5'
    - cron: '0  17 * * 1-5'
    - cron: '0  19 * * 1-5'
    - cron: '55 19 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy scipy

      - name: Run option scanner
        run: python scanner/run_scan.py

      - name: Verify results.json was created
        run: |
          echo "=== results.json preview ==="
          head -50 frontend/public/results.json

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-dir

      - name: Copy results.json into gh-pages
        run: |
          cp frontend/public/results.json gh-pages-dir/results.json
          echo "Copied results.json to gh-pages"

      - name: Commit and push results.json to gh-pages
        run: |
          cd gh-pages-dir
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          git diff --staged --quiet || git commit -m "scan: update results.json $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
